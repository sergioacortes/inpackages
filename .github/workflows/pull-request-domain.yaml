name: Inpackages Domain - Pull request

env:
  GITVERSION: '6.3.0'

on:
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
    branches:
      - main
    paths:
      - 'src/InPackages.Domain/**'

jobs:
  setup:
    name: 'Setup'
    uses: ./.github/workflows/setup.yaml
    with:
      gitversion: ${{ env.GITVERSION }}