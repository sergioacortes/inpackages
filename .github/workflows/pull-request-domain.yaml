name: Inpackages Domain - Pull request

on:
  workflow_dispatch: 
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
    branches:
      - main
    paths:
      - 'src/InPackages.Domain/**'

jobs:
  setup:
    name: 'Setup'
    uses: ./.github/workflows/setup.yaml
    with:
      gitversion: '6.3.0'